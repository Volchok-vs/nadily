<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Карта ділянок з фіксацією ярликів</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
    <style>
        #map { height: 80vh; width: 100%; }
        #output {
            height: 15vh;
            padding: 10px;
            font-family: monospace;
            background: #111;
            color: #0f0;
            overflow: auto;
            white-space: pre;
            font-size: 11px;
        }
        .controls { padding: 10px; background: #f4f4f4; display: flex; gap: 10px; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: none; color: white; font-weight: bold; }
        .btn-save { background: #28a745; }
        .btn-clear { background: #dc3545; }
        /* Стиль ярлика */
        .leaflet-tooltip {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #333;
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>

<div class="controls">
    <button class="btn-save" onclick="downloadGeoJSON()">💾 Зберегти у файл .geojson</button>
    <button class="btn-clear" onclick="clearMap()">🗑 Очистити все</button>
    <span style="font-size: 12px; align-self: center;">💡 Клікніть на ділянку, щоб ПЕРЕМІСТИТИ номер</span>
</div>

<div id="map"></div>
<div id="output">Код GeoJSON...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script>
   var map = L.map('map').setView([49.2321, 29.0577], 15);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles © Esri'
    }).addTo(map);

    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    // --- ФУНКЦІЯ ЗБЕРЕЖЕННЯ ---
    function updateAndSave() {
        var data = drawnItems.toGeoJSON();
        var jsonString = JSON.stringify(data, null, 2);
        document.getElementById('output').innerText = jsonString;
        
        localStorage.setItem('mapData_v3', jsonString); // Новий ключ для чистоти
        console.log("Дані синхронізовано з пам'яттю");
        // 💾 отправка на сервер
        fetch(API + '/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: jsonString
        }).catch(err => console.log("Не удалось сохранить на сервер:", err));
    }

    // --- ФУНКЦІЯ ПРИВ'ЯЗКИ КЛІКУ ТА ЯРЛИКА ---
    function setupLayer(layer, feature) {
        var props = feature.properties || {};
        var name = props.name || "Без назви";
        
        // Визначаємо позицію: або збережена, або центр
        var labelPos = props.labelPos ? L.latLng(props.labelPos) : layer.getBounds().getCenter();
        
        // Створюємо ярлик
        layer.bindTooltip(name, { permanent: true, direction: 'center' }).openTooltip(labelPos);

        // ОБРОБКА КЛІКУ ДЛЯ ПЕРЕМІЩЕННЯ
        layer.on('click', function (e) {
            L.DomEvent.stopPropagation(e); // Щоб клік не провалився крізь шари
            
            var newPos = e.latlng;
            layer.unbindTooltip();
            layer.bindTooltip(name, { permanent: true, direction: 'center' }).openTooltip(newPos);
            
            // Записуємо нову позицію прямо в дані об'єкта
            if (!layer.feature) layer.feature = { type: "Feature", properties: {} };
            layer.feature.properties.name = name;
            layer.feature.properties.labelPos = [newPos.lat, newPos.lng];
            
            updateAndSave();
            console.log("Ярлик " + name + " переміщено в: ", newPos);
        });
    }

    // --- ЗАВАНТАЖЕННЯ ---
    var saved = localStorage.getItem('mapData_v3') || localStorage.getItem('mapData_v2') || localStorage.getItem('myMapData');
    if (saved) {
        var geojson = JSON.parse(saved);
        L.geoJSON(geojson, {
            onEachFeature: function (feature, layer) {
                layer.feature = feature; 
                drawnItems.addLayer(layer);
                setupLayer(layer, feature);
            }
        });
        updateAndSave();
    }

    // --- ПАНЕЛЬ МАЛЮВАННЯ ---
    var drawControl = new L.Control.Draw({
        draw: { polygon: true, rectangle: true, circle: false, marker: false, polyline: false, circlemarker: false },
        edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);

    // 🔥 ПОДКЛЮЧЕНИЕ К СЕРВЕРУ
    const API = "https://nadily.onrender.com"; // ← сюда свой URL

    // 📥 загрузка с сервера
    fetch(API + '/parcels')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                onEachFeature: function (feature, layer) {
                    layer.feature = feature;
                    drawnItems.addLayer(layer);
                    setupLayer(layer, feature);
                }
            });
            console.log("Дані завантажені з сервера");
        })
        .catch(err => console.log("Сервер недоступний:", err));
        
    map.on('draw:created', function (e) {
        var layer = e.layer;
        var name = prompt("Номер ділянки:", "№" + (drawnItems.getLayers().length + 1));
        if (name) {
            var feature = { type: "Feature", properties: { name: name } };
            layer.feature = feature;
            drawnItems.addLayer(layer);
            setupLayer(layer, feature);
            updateAndSave();
        }
    });

    map.on('draw:edited', updateAndSave);
    map.on('draw:deleted', updateAndSave);

    function downloadGeoJSON() {
        var data = drawnItems.toGeoJSON();
        var blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = "plots_fixed.geojson"; a.click();
    }

    function clearMap() {
        if(confirm("Очистити все?")) {
            drawnItems.clearLayers();
            localStorage.clear();
            updateAndSave();
        }
    }
</script>
</body>
</html>
