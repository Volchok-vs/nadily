<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <title>Карта дільниць</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }

        /* --- СТИЛІЗАЦІЯ ПОПАПА (з макета) --- */
        .leaflet-popup-content-wrapper {
            background: #ffff !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
        }
        .leaflet-popup-tip { background: #fdfaf0 !important; }
        .popup-container {  min-width: 200px; }
        .popup-title { font-size: 17px; font-weight: bold; margin-bottom: 5px; display: block; text-align: center; }
        .popup-status { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
        
        /* Ряд для кнопок Маршрут + Деталі */
        .popup-btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
        
        .popup-btn {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ccc;
            background: white; cursor: pointer; font-size: 13px; text-decoration: none; color: #333;
        }
        a.popup-btn.popup-btn-sh {
            width: 128px;
        }
        .popup-btn.primary {
            background: #179133; color: white; border: none; font-weight: bold; padding: 10px;
        }

        /* --- КНОПКИ КЕРУВАННЯ --- */
        .leaflet-custom-btn {
            background-color: #fff; width: 34px; height: 34px; line-height: 34px;
            display: block; text-align: center; text-decoration: none; color: black;
            border-bottom: 1px solid #ccc; cursor: pointer; font-size: 18px; padding: 0; margin-top: 10px;}
        .user-control-panel { display: flex; gap: 10px; }
        .auth-btn { background: white; padding: 6px 14px; border: 2px solid rgba(0,0,0,0.2); border-radius: 6px;
            text-decoration: none; color: #333; font-weight: bold; font-size: 19px; }
        
        .edit-btn { color: white; border: none; font-size: 21.4px; padding: 6px 7.4px;}

        /* --- ЛЕГЕНДА --- */
        .legend { 
            background: white; padding: 12px; border-radius: 8px; 
            font-size: 13px; box-shadow: 0 0 15px rgba(0,0,0,0.2); 
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .info-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 18px; height: 18px; background: #1565C0; color: white;
            border-radius: 50%; font-size: 11px; cursor: pointer; margin-left: 10px;
        }

        /* Підписи на карті */
        .parcel-label {
            background: transparent !important; border: none !important; box-shadow: none !important;
            color: white !important; font-weight: bold; text-shadow: 1px 1px 2px black;
        }

        /* Модалки */
        #filterMenu, #superadmin-palette, .modal, .logic-modal {
            display: none; position: fixed; background: white; z-index: 3000;
            padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #filterMenu { top: 70px; left: 60px; width: 220px; }
        #superadmin-palette { top: 110px; left: 60px; width: 250px; }
        .modal { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2500; }
    </style>
    <link rel="stylesheet" href="css/style_mod.css">
</head>
<body>

<div id="map"></div>
<div id="modalOverlay" onclick="window.closeAllModals()"></div>

<div id="filterMenu">
    <h4 style="margin:0 0 10px 0;">🔍 Фільтр дільниць</h4>
    
    <div style="margin-bottom: 10px;">
        <input type="text" id="searchNumber" placeholder="Номер дільниці..." 
               style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; box-sizing: border-box;">
    </div>

    <div style="display: flex; flex-direction: column; gap: 8px; font-size: 14px;">
        <label><input type="radio" name="statusFilter" value="all" checked> Показати всі</label>
        <label><input type="radio" name="statusFilter" value="free"> ✅ Вільні</label>
        <label><input type="radio" name="statusFilter" value="taken"> 🚩 На руках (Всі)</label>
        <label id="myParcelsLabel" style="display:none;">
            <input type="radio" name="statusFilter" value="mine"> 👤 Мої дільниці
        </label>
    </div>
</div>

<div id="superadmin-palette">
    <h4 style="margin:0 0 10px 0;">🎨 Налаштування кольорів</h4>
    <div id="palette-inputs"></div>
    <button onclick="window.saveColorsToDB()" style="width:100%; background:#179133; color:white; border:none; padding:10px; border-radius:6px; margin-top:10px; cursor:pointer;">Зберегти</button>
</div>

<div id="takeModal" class="modal">
    <h3 style="margin-top:0;">Дільниця <span id="p-name"></span></h3>
    <select id="v-name-select" style="width:100%; padding:10px; margin-bottom:15px; border-radius:6px;"></select>
    <button onclick="window.confirmTake()" style="width:100%; background:#179133; color:white; border:none; padding:12px; border-radius:6px; font-weight:bold; cursor:pointer;">ПІДТВЕРДИТИ</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { handleUrlParams, shareParcel, returnParcel } from "./js/parcel-logic.js";
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    const supabase = createClient("https://modsgjjtwxbdnlycvifp.supabase.co", "sb_publishable_dbMty7e93fQwcZWdu_xeqw_3PUPc_3D");
    import { initSearchAndFilters } from "./js/search-filter.js";
    import { initGeolocation } from "./js/geolocation.js";
    window.shareParcel = shareParcel;
    window.returnParcel = (id) => returnParcel(id, supabase); // передаємо supabase
   
    window.allParcelLayers = [];

    window.quickLogout = () => {
        if (confirm("Швидкий вихід ?")) {
            // Очищуємо дані, але зберігаємо налаштування розробника!
            const devMode = localStorage.getItem('devMode');
            const showQuickLogout = localStorage.getItem('showQuickLogout');
            
            localStorage.clear();
            
            // Повертаємо налаштування розробника назад після очищення
            if (devMode) localStorage.setItem('devMode', devMode);
            if (showQuickLogout) localStorage.setItem('showQuickLogout', showQuickLogout);
            
            location.reload();
        }
    };

        // 1. Схема OpenStreetMap
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    });

    // 2. Супутник (Esri World Imagery)
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles © Esri'
    });

    // 3. Рельєф (OpenTopoMap)
    const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: 'Map data: © OSM, SRTM | style: © OpenTopoMap'
    });

    // 1. Чистий супутник
    const satelliteOnly = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

    // 2. Прозорий шар з назвами (наприклад, від CartoDB або Esri Labels)
    const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'shadowPane' // щоб назви були поверх всього, але під твоїми лініями дільниць
    });

    // Створюємо групу: Супутник + Назви
    const satelliteHybrid = L.layerGroup([satelliteOnly, labels]);
    // Ініціалізація карти з шаром за замовчуванням (наприклад, супутник)
    window.map = L.map('map', {
        center: [49.2321, 29.0577],
        zoom: 15,
        layers: [satelliteHybrid] // Шар за замовчуванням
    });

    // Створюємо об'єкти для контролера
    const baseMaps = {
        "Схема (OSM)": osm,
        "Супутник": satellite,
        "Супутник з вулицями": satelliteHybrid, // Тепер тут будуть назви
        "Рельєф": topo
    };

    // Додаємо перемикач на карту
    L.control.layers(baseMaps).addTo(map);

    initGeolocation(window.map);
  
    window.allParcelLayers = [];
    window.mapSettings = { colors: {} };

    // --- 1. КЕРУВАННЯ (КНОПКИ ТА РОЛІ) ---
    const role = localStorage.getItem('userRole');
    const isAdmin = (role === 'admin' || role === 'super_admin');

    const AuthControl = L.Control.extend({
        options: { position: 'topright' },
        onAdd: function() {
            const container = L.DomUtil.create('div', 'user-control-panel');
            const name = localStorage.getItem('userName');
            
            const showLogout = localStorage.getItem('showQuickLogout') === 'true';
            
            container.innerHTML = `
                <a href="${name ? 'profile.html' : 'login.html'}" class="auth-btn">${name ? '👤 ' + name : '🔐 Увійти'}</a>
                ${(showLogout && name) ? `
                <div onclick="window.quickLogout()" class="leaflet-bar auth-btn" 
                     style="background: #ff4757a3; color: white; cursor: pointer; text-align: center; padding: 6px 7.2px;">
                    👈
                </div>
            ` : ''}
                ${isAdmin ? '<a href="map-editor.html" class="auth-btn edit-btn">✏️</a>' : ''}
            `;
            return container;
        }
    });

    const ToolControl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function() {
            const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
            
            // Кнопка Де я?
            const btnLocate = L.DomUtil.create('button', 'leaflet-custom-btn', container);
            btnLocate.innerHTML = '🎯'; 
            btnLocate.title = "Моя локація"; // Додамо підказку

            // Викликаємо функцію, яку прописали в geolocation.js
            btnLocate.onclick = function(e) {
                L.DomEvent.stopPropagation(e); // Щоб клік по кнопці не спрацював як клік по карті
                window.locateMe(); 
            };

            // Кнопка Фільтр
            const btnFilter = L.DomUtil.create('button', 'leaflet-custom-btn', container);
            btnFilter.innerHTML = '🔍'; 
            btnFilter.onclick = () => {
                const m = document.getElementById('filterMenu');
                // Спочатку перевіряємо поточний стан
                const currentlyVisible = m.style.display === 'block';
                
                // Перемикаємо стан
                m.style.display = currentlyVisible ? 'none' : 'block';

                // Якщо ми щойно відкрили вікно (стало block)
                if (!currentlyVisible) { 
                    const myLabel = document.getElementById('myParcelsLabel');
                    if (myLabel) {
                        myLabel.style.display = localStorage.getItem('userId') ? 'block' : 'none';
                    }
                }
            };

            // Кнопка Палітра (Тільки Супер Адмін)
            if (role === 'super_admin') {
                const btnPal = L.DomUtil.create('button', 'leaflet-custom-btn', container);
                btnPal.innerHTML = '🎨'; 
                btnPal.onclick = () => {
                    const p = document.getElementById('superadmin-palette');
                    p.style.display = p.style.display === 'none' ? 'block' : 'none';
                };
            }
            return container;
        }
    });

    const LegendControl = L.Control.extend({
        options: { position: 'bottomright' },
        onAdd: function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <div style="margin-bottom:8px;"><b>Легенда</b></div>
                <div class="legend-item"><div class="dot" style="background:#008000"></div> Вільна</div>
                <div class="legend-item"><div class="dot" style="background:#e74c3c"></div> Зайнята</div>
            `;
            return div;
        }
    });

    map.addControl(new AuthControl());
    map.addControl(new ToolControl());
    map.addControl(new LegendControl());

    // --- 2. ЛОГІКА ДАНИХ ТА ПАЛІТРИ ---
    async function loadSettings() {
        const { data } = await supabase.from('settings').select('data').eq('id', 'map_palette').maybeSingle();
        if (data) {
            window.mapSettings.colors = data.data;
            renderPaletteEditor();
        }
    }

    function renderPaletteEditor() {
        const container = document.getElementById('palette-inputs');
        const labels = { private: "Вільна", taken: "Зайнята", business: "Бізнес", highrise: "Поверхи" };
        container.innerHTML = Object.keys(labels).map(key => {
            const conf = window.mapSettings.colors[key] || { color: "#ffffff", opacity: 0.5 };
            return `<div style="display:flex; justify-content:space-between; margin-bottom:5px; align-items:center;">
                <span style="font-size:12px;">${labels[key]}</span>
                <input type="color" value="${conf.color}" onchange="window.updateColorValue('${key}', 'color', this.value)">
            </div>`;
        }).join('');
    }

    window.updateColorValue = (key, field, val) => {
        if(!window.mapSettings.colors[key]) window.mapSettings.colors[key] = {};
        window.mapSettings.colors[key][field] = val;
    };

    window.saveColorsToDB = async () => {
        await supabase.from('settings').upsert({ id: 'map_palette', data: window.mapSettings.colors });
        location.reload();
    };

    function getStyle(p) {
        const s = window.mapSettings.colors;
        let fill = s.private?.color || '#008000';
        if (p.status === 'taken') fill = s.taken?.color || '#e74c3c';
        return { color: "white", weight: 2, fillColor: fill, fillOpacity: 0.5 };
    }

    // Модальне віконце на карті
    async function loadParcels() {
        const { data } = await supabase.from('parcels').select('*');
        window.allParcelLayers = []; // Зміни тут, щоб було window.
        // Отримуємо дані поточного користувача
        const role = localStorage.getItem('userRole');
        const currentUserId = localStorage.getItem('userId'); // ID авторизованого юзера
        const isAdmin = (role === 'admin' || role === 'super_admin');
        const isAuth = !!currentUserId; // Перевірка чи залогінений

        data?.forEach(p => {
            if (!p.geom) return;
            const layer = L.geoJSON(p.geom, { style: getStyle(p) }).addTo(map);
            const labelPos = (p.label_pos && p.label_pos.length === 2) 
                ? L.latLng(p.label_pos[0], p.label_pos[1]) 
                : layer.getBounds().getCenter();

            // 3. ПРИВ'ЯЗУЄМО ТА ВІДКРИВАЄМО НОМЕР
            // Використовуємо bindTooltip + openTooltip для точного позиціювання
            layer.bindTooltip(p.name || "", { 
                permanent: true, 
                direction: 'center', 
                className: 'parcel-label' 
            }).openTooltip(labelPos);

            const label = layer.getTooltip(); // Отримуємо посилання на створений тултіп
            

            window.allParcelLayers.push({ 
                layer, 
                label, 
                name: p.name.toString().toLowerCase(),
                data: p 
            });
            layer.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                const isTaken = p.status === 'taken';
                
                // Чи має право цей юзер здати цю конкретну дільницю?
                // (Він адмін АБО це його дільниця)
                const canReturn = isAdmin || (isAuth && String(p.taken_by_id) === String(currentUserId));
                 // Формуємо посилання на дільницю (використовуємо назву дільниці як унікальний параметр)
                const shareLink = `${window.location.origin}${window.location.pathname}?parcel=${p.name}`;

                // Отримуємо координати центру для Google Maps
                const center = layer.getBounds().getCenter();
                // Правильне посилання для Google Maps (стандартний формат)
                const googleMapsUrl = `https://www.google.com/maps?q=${center.lat},${center.lng}`;

                let popupHtml = `
                    <div class="popup-container">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 5px;">
                            <span class="popup-title" style="margin:0;">Дільниця ${p.name}</span>
                        
                            
                        <button onclick="window.shareParcel('${p.name}', '${shareLink}')" 
                        style="border:none; background:none; cursor:pointer; font-size:18px; padding:0;" 
                        title="Поділитися">
                    📤
                        </button>
                    </div>

                <div class="popup-status">Статус: 
                    <span style="color:${isTaken ? '#e74c3c' : '#28a745'}">● ${isTaken ? 'Зайнята' : 'Вільна'}</span>
                </div>
                
                <div class="popup-btn-row">
                    <button class="popup-btn" onclick="window.open('${googleMapsUrl}', '_blank')">📍 Маршрут</button>
                    ${isAdmin ? `<a href="parcel-details.html?id=${p.id}" class="popup-btn popup-btn-sh">⚙️ Картка</a>` : ''}
                </div>

                ${!isTaken ? `
                    ${isAuth ? 
                        `<button class="popup-btn primary" onclick="window.showTakeModal(${p.id}, '${p.name}')">✋ Взяти дільницю</button>` 
                        : `<p style="font-size:11px; color:orange; text-align:center; margin: 10px 0 0 0;">Увійдіть, щоб взяти дільницю</p>`
                    }
                ` : `
                    ${canReturn ? 
                        `<button class="popup-btn" style="background:#f8f9fa; border:1px solid #dc3545; color:#dc3545; margin-bottom:8px; font-weight:bold;" 
                                onclick="window.returnParcel(${p.id})">🔙 Здати дільницю</button>` 
                        : ''
                    }
                    
                    ${isAdmin ? `
                        <div style="text-align:center; font-size:12px; color:#666;">
                            Взяв: <b>${p.taken_by || 'Невідомо'}</b>
                        </div>
                    ` : ''}
                `}
            </div>
        `;

        // Не забудь додати цю допоміжну функцію для копіювання десь у скрипті:
        window.copyShareLink = (link) => {
            navigator.clipboard.writeText(link).then(() => {
                alert("Посилання на дільницю скопійовано!");
            });
        };
                layer.bindPopup(popupHtml, { minWidth: 200 }).openPopup();
            });
            allParcelLayers.push({ layer, label, name: p.name.toLowerCase() });
        });

        initSearchAndFilters(window.map, window.allParcelLayers);
        
        handleUrlParams();
    }

    
    window.showTakeModal = async (id, name) => {
        window.currentId = id;
        document.getElementById('p-name').innerText = name;
        document.getElementById('modalOverlay').style.display = 'block';
        document.getElementById('takeModal').style.display = 'block';
        const { data } = await supabase.from('publishers').select('id, last_name, name').order('last_name');
        document.getElementById('v-name-select').innerHTML = data.map(u => `<option value="${u.id}">${u.last_name} ${u.name}</option>`).join('');
    };

    window.confirmTake = async () => {
        const s = document.getElementById('v-name-select');
        await supabase.from('parcels').update({
            status: 'taken', taken_by: s.options[s.selectedIndex].text,
            taken_by_id: s.value, taken_at: new Date().toISOString()
        }).eq('id', window.currentId);
        location.reload();
    };

    window.closeAllModals = () => {
        document.querySelectorAll('.modal, #modalOverlay, #filterMenu, #superadmin-palette').forEach(el => el.style.display = 'none');
    };

    document.addEventListener('DOMContentLoaded', () => {
        loadSettings();
        loadParcels();
    });

    let searchTimeout; // Змінна для зберігання таймера поза функцією

    document.getElementById('searchNumber').addEventListener('input', function(e) {
        const val = e.target.value.trim().toLowerCase();
        
        // 1. МИТТЄВА ФІЛЬТРАЦІЯ (візуально приховуємо зайве відразу)
        window.allParcelLayers.forEach(item => {
            const isMatch = item.name.includes(val);
            if (isMatch) {
                window.map.addLayer(item.layer);
            } else {
                window.map.removeLayer(item.layer);
            }
        });

        // 2. ЗАТРИМКА ПЕРЕД ПОЛЬОТОМ (Debounce)
        clearTimeout(searchTimeout); // Скасовуємо попередній таймер, якщо ти натиснув клавішу знову
        
        searchTimeout = setTimeout(() => {
            if (val !== "") {
                // Шукаємо точну відповідність номера
                const target = window.allParcelLayers.find(p => p.name === val);
                
               if (target) {
                    // Отримуємо межі (границі) дільниці
                    const bounds = target.layer.getBounds();
                    
                    // Використовуємо flyToBounds для розумного фокусування
                    window.map.flyToBounds(bounds, {
                        padding: [100, 100],      // Внутрішній відступ (чим більше число, тим меншою буде дільниця на екрані)
                        duration: 2.0,            // Час польоту в секундах
                        easeLinearity: 0.1,       // Максимальна плавність старту та зупинки
                        maxZoom: 18               // Щоб дільниця не ставала занадто великою (на весь екран), якщо вона маленька
                    });

                    // Відкриваємо попап з невеликою затримкою після приземлення
                    setTimeout(() => {
                        target.layer.fire('click');
                    }, 2100); 
                }
            }
        }, 800); // Пауза 800 мс (0.8 секунди)
    });

    document.addEventListener('click', (event) => {
        const menus = ['filterMenu', 'superadmin-palette', 'takeModal'];
        const toggleButtons = ['.leaflet-custom-btn', '.edit-btn', '.auth-btn', '.popup-btn']; // Додав .popup-btn

        // 1. Перевіряємо, чи клікнули на якусь кнопку відкриття
        let clickedOnButton = toggleButtons.some(selector => {
            const elements = document.querySelectorAll(selector);
            return Array.from(elements).some(el => el.contains(event.target));
        });

        // 2. Окремо перевіряємо, чи клік був всередині попапа Leaflet
        const clickedInsidePopup = event.target.closest('.leaflet-popup');

        // Якщо клікнули на кнопку або всередині попапа — не закриваємо нічого
        if (clickedOnButton || clickedInsidePopup) return; 

        // 3. Закриваємо активні меню
        menus.forEach(id => {
            const menu = document.getElementById(id);
            if (menu && menu.style.display === 'block' && !menu.contains(event.target)) {
                menu.style.display = 'none';
                if (id === 'takeModal') {
                    const overlay = document.getElementById('modalOverlay');
                    if (overlay) overlay.style.display = 'none';
                }
            }
        });
    });
</script>
