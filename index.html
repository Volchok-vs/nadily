<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <title>Карта дільниць для вісників</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* Кнопки керування зверху */
        .control-btn {
            position: fixed; top: 20px; z-index: 1001;
            padding: 10px 20px; border-radius: 8px;
            text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
        }
        .login-btn { left: 20px; background: white; color: black; border: 1px solid #ddd; }
        .editor-btn { left: 180px; background-color: #f1f1f1; color: #555; border: 1px solid #ccc; }
        .editor-btn:hover { background-color: #ff8800; color: white; border-color: #ff8800; transform: translateY(-2px); }

        /* Стиль кастомної кнопки на карті (під зумом) */
        .leaflet-bar button {
            background-color: #fff;
            width: 30px;
            height: 30px;
            line-height: 30px;
            display: block;
            text-align: center;
            text-decoration: none;
            color: black;
            border: none;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
            font-size: 16px;
        }
        .leaflet-bar button:hover { background-color: #f4f4f4; }
        .leaflet-bar button:last-child { border-bottom: none; border-radius: 0 0 2px 2px; }

        /* Віконце палітри */
        #superadmin-palette {
            display: none; position: fixed; right: 20px; top: 80px; 
            background: white; padding: 15px; border-radius: 10px; 
            z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 240px;
        }

        .modal {
            display: none; position: fixed; z-index: 2000;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 320px; box-sizing: border-box;
        }
        .parcel-label {
            background: transparent !important; border: none !important; box-shadow: none !important;
            color: white !important; font-weight: bold !important; font-size: 14px !important;
            text-shadow: 1px 1px 2px black, -1px -1px 2px black;
        }
    </style>
</head>
<body>

<a href="login.html" id="loginBtn" class="control-btn login-btn">🔐 Увійти</a>
<a href="map-editor.html" id="adminEditBtn" class="control-btn editor-btn" style="display: none;">✏️ Редактор</a>

<div id="map"></div>

<div id="superadmin-palette">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h4 style="margin:0;">🎨 Кольори</h4>
        <span onclick="window.togglePalette()" style="cursor:pointer; font-size:20px;">×</span>
    </div>
    <div id="palette-inputs"></div>
    <button onclick="window.saveColorsToDB()" style="width:100%; margin-top:10px; background:#2ecc71; border:none; color:white; padding:10px; border-radius:6px; cursor:pointer; font-weight:bold;">💾 Зберегти для всіх</button>
</div>

<div id="modalOverlay" onclick="window.closeModal()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1999;"></div>
<div id="takeModal" class="modal">
    <span onclick="window.closeModal()" style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:24px; color:#aaa; font-weight:bold;">×</span>
    <h3>Призначити дільницю <span id="p-name" style="color:#007bff;"></span></h3>
    <select id="v-name-select"></select>
    <button onclick="window.confirmTake()" class="btn-confirm">ПІДТВЕРДИТИ</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    const supabase = createClient("https://modsgjjtwxbdnlycvifp.supabase.co", "sb_publishable_dbMty7e93fQwcZWdu_xeqw_3PUPc_3D");

    window.mapSettings = { colors: {} };

    // Функція відкриття/закриття палітри
    window.togglePalette = () => {
        const p = document.getElementById('superadmin-palette');
        p.style.display = (p.style.display === 'none' || p.style.display === '') ? 'block' : 'none';
    };

    async function loadSettings() {
        const { data } = await supabase.from('settings').select('data').eq('id', 'map_palette').single();
        if (data) {
            window.mapSettings.colors = data.data;
            const container = document.getElementById('palette-inputs');
            container.innerHTML = '';
            const labels = {
                private: "Приватний", business: "Бізнес", highrise: "Поверхівки",
                quarantine: "Карантин", taken: "Зайнята", warning: "Прострочена"
            };
            Object.keys(labels).forEach(key => {
                const config = window.mapSettings.colors[key] || { color: "#ffffff", opacity: 0.5 };
                container.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; font-size:12px;">
                        <span>${labels[key]}:</span>
                        <input type="color" value="${config.color}" onchange="window.updateColorValue('${key}', 'color', this.value)">
                        <input type="number" value="${config.opacity}" step="0.1" min="0" max="1" style="width:40px;" onchange="window.updateColorValue('${key}', 'opacity', this.value)">
                    </div>`;
            });
        }
    }

    function getParcelStyle(pData) {
        const defaultColors = {
            private: { color: "#008000", opacity: 0.5 }, business: { color: "#0000FF", opacity: 0.5 },
            highrise: { color: "#FFA500", opacity: 0.5 }, quarantine: { color: "#808080", opacity: 0.5 },
            taken: { color: "#9b59b6", opacity: 0.7 }, warning: { color: "#e74c3c", opacity: 0.5 },
            border: { color: "#ffffff", width: 2 }
        };
        const s = { ...defaultColors, ...(window.mapSettings.colors || {}) };
        const now = new Date();
        const returnDate = new Date(pData.last_returned || 0);
        const diffMonths = (now - returnDate) / (1000 * 60 * 60 * 24 * 30.44);
        let style = { color: s.border.color, weight: s.border.width, fillOpacity: 0.5, fillColor: '#ffffff' };
        if (pData.status === 'taken') { style.fillColor = s.taken.color; style.fillOpacity = s.taken.opacity; return style; }
        if (diffMonths < 3) { style.fillColor = s.quarantine.color; style.fillOpacity = s.quarantine.opacity; return style; }
        let baseColor = s.private.color;
        const cat = pData.category || "";
        if (cat === 'Ділова') baseColor = s.business.color;
        else if (cat === 'Багатоповерхівки') baseColor = s.highrise.color;
        if (cat.includes('Приватний') && cat.includes('Багатоповерхівки')) { baseColor = s.highrise.color; style.dashArray = "5, 5"; }
        if (diffMonths >= 6) { style.fillColor = s.warning.color; style.fillOpacity = 0.7; } 
        else { style.fillColor = baseColor; style.fillOpacity = s.private.opacity; }
        return style;
    }

    window.updateColorValue = (key, field, value) => {
        if(!window.mapSettings.colors[key]) window.mapSettings.colors[key] = {};
        window.mapSettings.colors[key][field] = field === 'opacity' ? parseFloat(value) : value;
    };

    window.saveColorsToDB = async () => {
        const { error } = await supabase.from('settings').upsert({ id: 'map_palette', data: window.mapSettings.colors });
        if (!error) { alert("Збережено!"); location.reload(); }
    };

    async function initMap() {
        const map = L.map('map').setView([49.2321, 29.0577], 15);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        // Додаємо кнопку палітри для Super Admin
        const role = localStorage.getItem('userRole');
        if (role === 'super_admin') {
            const PaletteControl = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function() {
                    const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                    const button = L.DomUtil.create('button', '', container);
                    button.innerHTML = '🎨';
                    button.title = 'Налаштування кольорів';
                    button.onclick = function(e) {
                        L.DomEvent.stopPropagation(e);
                        window.togglePalette();
                    };
                    return container;
                }
            });
            map.addControl(new PaletteControl());
        }

        const { data } = await supabase.from('parcels').select('*');
        if (data) renderParcels(data, map);
    }

    function renderParcels(data, map) {
        data.forEach(pData => {
            if (!pData.geom) return;
            const parcelLayer = L.geoJSON(pData.geom, { style: getParcelStyle(pData) }).addTo(map);
            const labelPos = (pData.label_pos) ? L.latLng(pData.label_pos[0], pData.label_pos[1]) : parcelLayer.getBounds().getCenter();
            L.tooltip({ permanent: true, direction: 'center', className: 'parcel-label' }).setContent(pData.name || "").setLatLng(labelPos).addTo(map);
            parcelLayer.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                const role = localStorage.getItem('userRole');
                const now = new Date();
                const diffMonths = (now - new Date(pData.last_returned || 0)) / (1000 * 60 * 60 * 24 * 30.44);
                const isAdmin = (role === 'admin' || role === 'super_admin');
                let popup = `<div style="min-width:180px;"><h3>Дільниця ${pData.name}</h3>`;
                if (pData.status === 'taken') popup += `<p>🔴 Зайнята: ${pData.taken_by}</p>`;
                else if (diffMonths < 3) popup += `<p style="color:gray;">⌛ Карантин</p>`;
                else if (role) popup += `<button onclick="window.showModal(${pData.id}, '${pData.name}')" style="background:#28a745; color:white; width:100%; padding:10px; border:none; border-radius:4px; cursor:pointer;">✋ Взяти</button>`;
                popup += `<button onclick="window.location.href='parcel-details.html?id=${pData.id}'" style="width:100%; margin-top:8px; background:none; border:1px solid #ccc; padding:5px; border-radius:4px; cursor:pointer;">⚙️ Деталі</button></div>`;
                parcelLayer.bindPopup(popup).openPopup();
            });
        });
    }

    // Модалки та авторизація
    window.showModal = async (id, name) => {
        window.currentParcelId = id;
        document.getElementById('p-name').innerText = name;
        document.getElementById('modalOverlay').style.display = 'block';
        document.getElementById('takeModal').style.display = 'block';
        const select = document.getElementById('v-name-select');
        const { data: users } = await supabase.from('publishers').select('id, last_name, name').order('last_name', { ascending: true });
        if (users) {
            select.innerHTML = '';
            users.forEach(user => {
                const opt = document.createElement('option');
                opt.value = user.id;
                opt.text = `${user.last_name || ''} ${user.name || ''}`.trim();
                if (user.id === localStorage.getItem('userId')) opt.selected = true;
                select.appendChild(opt);
            });
        }
    };

    window.confirmTake = async () => {
        const select = document.getElementById('v-name-select');
        await supabase.from('parcels').update({
            status: 'taken', taken_by: select.options[select.selectedIndex].text,
            taken_by_id: select.value, taken_at: new Date().toISOString()
        }).eq('id', window.currentParcelId);
        location.reload();
    };

    window.closeModal = () => {
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('takeModal').style.display = 'none';
    };

    document.addEventListener('DOMContentLoaded', async () => {
        const name = localStorage.getItem('userName');
        const role = localStorage.getItem('userRole');
        if (name) {
            const btn = document.getElementById('loginBtn');
            btn.innerText = `👤 ${name}`;
            btn.href = "profile.html";
        }
        if (role === 'super_admin' || role === 'admin') {
            document.getElementById('adminEditBtn').style.display = 'flex';
        }
        await loadSettings();
        await initMap();
    });
</script>
</body>
</html>
