<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Карта ділянок - Supabase & Hamburger</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* КОНТЕЙНЕР МЕНЮ */
        .menu-container {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
        }

        /* КНОПКА ГАМБУРГЕР */
        .hamburger {
            background: #333;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 16px;
        }

        /* ПАНЕЛЬ КЕРУВАННЯ */
        .controls {
            display: none; /* Сховано за замовчуванням */
            flex-direction: column;
            gap: 8px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 260px;
        }

        .controls.active { display: flex; }

        /* КНОПКИ */
        button { 
            padding: 10px; 
            cursor: pointer; 
            border-radius: 4px; 
            border: none; 
            color: white; 
            font-weight: bold; 
            font-size: 13px;
        }

        .btn-save { background: #28a745; width: 100%; }
        .btn-upload { background: #007bff; flex: 2; }
        .btn-clear { background: #dc3545; flex: 1; }

        /* ГРУПУВАННЯ */
        .row-group {
            display: flex;
            gap: 5px;
            width: 100%;
        }

        hr {
            border: 0;
            border-top: 1px solid #ddd;
            margin: 5px 0;
        }

        /* ЧЕКБОКС */
        .checkbox-label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #f1f1f1;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
        }

        #enableLabelMove { width: 18px; height: 18px; cursor: pointer; }

        #output {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 5px;
            font-size: 10px;
            max-width: 200px;
            border-radius: 4px;
            pointer-events: none;
        }

        .leaflet-tooltip { 
            background: white; 
            border: 1px solid #333; 
            font-weight: bold; 
            color: #000; 
        }
    </style>
</head>
<body>

<div class="menu-container">
    <button class="hamburger" onclick="toggleMenu()">☰ Меню</button>
    <div class="controls" id="menuControls">
        <button class="btn-save" onclick="window.downloadGeoJSON()">💾 Скачати .geojson</button>
        
        <hr>

        <div class="row-group">
            <button class="btn-upload" onclick="window.handleUpload()">📥 Завантажити</button>
            <button class="btn-clear" onclick="window.clearMap()">🗑 Очистити</button>
        </div>
        <input type="file" id="fileInput" accept=".geojson" style="font-size: 10px; margin-top: 5px;">

        <hr>

        <label class="checkbox-label">
            <input type="checkbox" id="enableLabelMove"> 
            <span>✢ Редагувати ярлики</span>
        </label>
    </div>
</div>

<div id="map"></div>
<div id="output">Статус бази...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseUrl = "https://modsgjjtwxbdnlycvifp.supabase.co";
    const supabaseKey = "sb_publishable_dbMty7e93fQwcZWdu_xeqw_3PUPc_3D";
    const supabase = createClient(supabaseUrl, supabaseKey);

    // Функція гамбургера
    window.toggleMenu = function() {
        document.getElementById('menuControls').classList.toggle('active');
    }

    // Карта
    var map = L.map('map').setView([49.2321, 29.0577], 15);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles © Esri'
    }).addTo(map);

    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    // Налаштування шару
    window.setupLayer = function(layer, feature) {
        var props = feature.properties || {};
        var name = props.name || "Без назви";
        var labelPos = props.labelPos ? L.latLng(props.labelPos) : layer.getBounds().getCenter();
        
        layer.bindTooltip(name, { permanent: true, direction: 'center' }).openTooltip(labelPos);

        layer.on('click', function (e) {
            L.DomEvent.stopPropagation(e);
            if (!document.getElementById('enableLabelMove').checked) return;

            var newPos = e.latlng;
            layer.unbindTooltip();
            layer.bindTooltip(name, { permanent: true, direction: 'center' }).openTooltip(newPos);
            
            if (!layer.feature) layer.feature = { type: "Feature", properties: {} };
            layer.feature.properties.name = name;
            layer.feature.properties.labelPos = [newPos.lat, newPos.lng];
            
            saveToSupabase();
        });
    }

    // Збереження
    async function saveToSupabase() {
        const parcels = [];
        drawnItems.eachLayer(layer => {
            let name = "Без назви";
            if (layer.getTooltip()) name = layer.getTooltip().getContent().toString();
            
            let labelPos = null;
            if (layer.getTooltip()) {
                const ll = layer.getTooltip().getLatLng();
                labelPos = [ll.lat, ll.lng];
            }

            parcels.push({
                name: name,
                geom: layer.toGeoJSON().geometry,
                label_pos: labelPos
            });
        });

        await supabase.from('parcels').delete().neq('id', 0);
        const { error } = await supabase.from('parcels').insert(parcels);
        if (!error) document.getElementById('output').innerText = "База оновлена";
    }

    // Завантаження файлу
    window.handleUpload = async function() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Файл не обрано");

        const text = await file.text();
        const geojson = JSON.parse(text);
        const parcels = geojson.features.map(f => ({
            name: f.properties?.name || f.properties?.Name || "№?",
            geom: f.geometry,
            label_pos: f.properties?.labelPos || null
        }));

        await supabase.from('parcels').delete().neq('id', 0);
        await supabase.from('parcels').insert(parcels);
        loadParcelsFromDB();
    }

    // Завантаження з бази
    async function loadParcelsFromDB() {
        drawnItems.clearLayers();
        let { data, error } = await supabase.from('parcels').select('*');
        if (error) return;

        data.forEach(p => {
            L.geoJSON(p.geom, {
                onEachFeature: function (f, layer) {
                    f.properties = { name: p.name, labelPos: p.label_pos };
                    layer.feature = f;
                    drawnItems.addLayer(layer);
                    window.setupLayer(layer, f);
                }
            });
        });
        document.getElementById('output').innerText = "Завантажено: " + data.length;
    }

    // Малювання
    var drawControl = new L.Control.Draw({
        draw: { polygon: true, rectangle: true, circle: false, marker: false, polyline: false, circlemarker: false },
        edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);

    map.on('draw:created', function (e) {
        var layer = e.layer;
        var name = prompt("Номер ділянки:", "№" + (drawnItems.getLayers().length + 1));
        if (name) {
            layer.feature = { type: "Feature", properties: { name: name } };
            drawnItems.addLayer(layer);
            window.setupLayer(layer, layer.feature);
            saveToSupabase();
        }
    });

    map.on('draw:edited', saveToSupabase);
    map.on('draw:deleted', saveToSupabase);

    window.downloadGeoJSON = function() {
        var data = drawnItems.toGeoJSON();
        var blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "map.geojson";
        a.click();
    }

    window.clearMap = async function() {
    // Перший рівень: звичайне питання
    const firstCheck = confirm("⚠️ Ви впевнені, що хочете ПОВНІСТЮ ОЧИСТИТИ БАЗУ ДАНИХ?\nЦю дію неможливо скасувати.");
    
    if (firstCheck) {
        // Другий рівень: захист від "випадкового ОК"
        const secondCheck = prompt("Для підтвердження введіть слово: ВИДАЛИТИ");
        
        if (secondCheck === "ВИДАЛИТИ") {
            try {
                document.getElementById('output').innerText = "Видалення...";
                
                // Видаляємо всі записи в Supabase
                const { error } = await supabase.from('parcels').delete().neq('id', 0);
                
                if (error) throw error;

                // Очищаємо карту
                drawnItems.clearLayers();
                document.getElementById('output').innerText = "Базу успішно очищено.";
                console.log("Database cleared by user.");
                
            } catch (err) {
                console.error("Помилка при видаленні:", err.message);
                alert("Не вдалося видалити: " + err.message);
            }
        } else {
            alert("Слово введено неправильно. Видалення скасовано.");
        }
    }
}

    loadParcelsFromDB();
</script>

</body>
</html>
