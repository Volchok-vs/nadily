<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Деталі дільниці</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Глобальні стилі */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .hidden { display: none !important; }

        /* Карта та Сітка */
        #staticMap { height: 300px; width: 100%; border-radius: 8px; margin: 20px 0; border: 1px solid #ddd; z-index: 1; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 8px; background: #fff; position: relative; }
        
        /* Форми та Кнопки */
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; }
        input[type="date"], input[type="text"], select, textarea { width: 100%; padding: 10px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 15px; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; transition: 0.3s; }
        .btn-save { background: #28a745; color: white; width: 100%; }
        .btn-save:hover { background: #218838; }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }
        #backBtn { background: #6c757d; color: white; }

        /* Таблиця історії */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; font-size: 13px; }
        th { background: #f8f9fa; }
        .badge { background: #e3f2fd; color: #0d47a1; padding: 3px 8px; border-radius: 4px; font-weight: bold; }

        /* Модальні вікна */
        #commentModal, #manualLogModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }

        .comment-item { padding: 8px 10px 6px 10px; border-radius: 8px; margin-bottom: 8px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .comment-item p { margin: 0; padding: 2px 0 6px 0; font-size: 13.5px; line-height: 1.4; color: #222; }
        .comment-item .author-line { font-size: 10.5px; color: rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 4px; }
        .color-1 { background: #C8E6C9; border-left: 5px solid #4CAF50; }
        .color-2 { background: #FFECB3; border-left: 5px solid #FFB300; }
        .color-3 { background: #FFCDD2; border-left: 5px solid #E53935; }
        .color-4 { background: #E1BEE7; border-left: 5px solid #8E24AA; }
        .color-5 { background: #B3E5FC; border-left: 5px solid #039BE5; }
        .color-6 { background: #CFD8DC; border-left: 5px solid #546E7A; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="parcelTitle">Дільниця №...</h1>
        <button id="backBtn">⬅️ Назад</button>
    </div>

    <div id="staticMap"></div>

    <div class="grid">
        <div class="card">
            <h3>📝 Редагування</h3>
            <div id="adminOnlyFields">
                <label>Останнє опрацювання (адмін):</label>
                <input type="date" id="lastProcessedDate">
            </div>
            <button id="mainSaveBtn" onclick="saveGeneralChanges()" class="btn-save">Зберегти зміни</button>
        </div>

        <div class="card">
            <h3>Статус</h3>
            <div style="display: flex; align-items: center; justify-content: flex-start; gap: 15px;">
                <p id="currentStatus" style="margin: 0; font-weight: 500;">Завантаження...</p>
                
                <button id="adminReturnBtn" style="display: none; background: #ff4757; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.2s;">
                    Здати
                </button>
            </div>
            <hr>
            <h4>📝 Коментарі</h4>
            <div id="commentsList"></div>
            <div id="addCommentContainer">
        </div>
</div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0;">📜 Історія опрацювання</h3>
            <button onclick="showManualLogModal()" style="background: #28a745; color: white; padding: 8px 12px; border-radius: 6px;">➕ Додати вручну</button>
        </div>
        <table>
            <thead>
                <tr><th>Вісник</th><th>Отримано</th><th>Здано</th><th>Час</th><th>⚙️</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<div id="commentModal" class="hidden">
    <div class="modal-content">
        <h3 id="commentModalTitle">Додати коментар</h3>
        <textarea id="newCommentText" rows="4" placeholder="Ваш коментар..."></textarea>
        <div style="margin: 10px 0;">
            <label style="display: inline; font-weight: normal;">
                <input type="checkbox" id="hideAuthorCheckbox"> Анонімно
            </label>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="saveComment()" style="flex: 1; background: #28a745; color: white;">Зберегти</button>
            <button onclick="closeCommentModal()" style="flex: 1; background: #6c757d; color: white;">Скасувати</button>
        </div>
    </div>
</div>

<div id="manualLogModal" class="hidden">
    <div class="modal-content">
        <h3>Додати запис (архів)</h3>
        <label>Вісник:</label>
        <select id="manualPublisherSelect">
            <option value="">Завантаження вісників...</option>
        </select>
        <label>Дата отримання:</label><input type="date" id="manualDateIn">
        <label>Дата здачі:</label><input type="date" id="manualDateOut">
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="saveManualLog()" style="flex: 1; background: #28a745; color: white;">Зберегти</button>
            <button onclick="hideManualLogModal()" style="flex: 1; background: #6c757d; color: white;">Скасувати</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    const supabase = createClient("https://modsgjjtwxbdnlycvifp.supabase.co", "sb_publishable_dbMty7e93fQwcZWdu_xeqw_3PUPc_3D");

    const urlParams = new URLSearchParams(window.location.search);
    const parcelId = urlParams.get('id');
    const userRole = localStorage.getItem('userRole');
    const currentUserId = localStorage.getItem('userId');
    const isAdmin = (userRole === 'admin' || userRole === 'super_admin');

    let editingCommentId = null; 
    let allComments = [];

    async function init() {
        if (!parcelId) return (window.location.href = 'profile.html');
        await loadParcelInfo();
        await loadHistory();
        await loadComments();
    }

    // --- НОВА ФУНКЦІЯ ЗДАЧІ ДІЛЬНИЦІ ---
    window.returnParcel = async (id, name) => {
        if (!confirm(`Здати дільницю №${name}?`)) return;

        const { error } = await supabase.from('parcels').update({ 
            status: 'free', 
            taken_by_id: null, 
            taken_by: null,
            taken_at: null,
            last_returned: new Date().toISOString()
        }).eq('id', id);

        if (!error) {
            alert('Дільницю здано');
            location.reload();
        } else {
            alert('Помилка: ' + error.message);
        }
    };

    // --- ФУНКЦІЇ КЕРУВАННЯ КОМЕНТАРЯМИ ---

    window.prepareEditComment = (index) => {
        const comment = allComments[index];
        if (!comment) return;
        
        editingCommentId = comment.id;
        document.getElementById('newCommentText').value = comment.content;
        document.getElementById('hideAuthorCheckbox').checked = comment.is_anonymous;
        
        // Відкриваємо модальне вікно для редагування
        document.getElementById('commentModal').classList.remove('hidden');
    };

    window.deleteComment = async (id) => {
        if (!confirm("Видалити цей коментар?")) return;
        
        const { error } = await supabase
            .from('parcel_comments')
            .delete()
            .eq('id', id);

        if (!error) {
            loadComments(); // Оновлюємо список після видалення
        } else {
            alert("Помилка видалення: " + error.message);
        }
    };

    // --- ОНОВЛЕНА ФУНКЦІЯ ІНФО (З КНОПКОЮ) ---
    async function loadParcelInfo() {
        const { data: p } = await supabase.from('parcels').select('*').eq('id', parcelId).single();
        if (!p) return;

        document.getElementById('parcelTitle').innerText = `Дільниця №${p.name}`;
        
        const dateInput = document.getElementById('lastProcessedDate');
        if (dateInput) {
            dateInput.value = p.last_processed || '';
            dateInput.disabled = !isAdmin;
        }

        const statusElement = document.getElementById('currentStatus');
        const returnBtn = document.getElementById('adminReturnBtn');

        if (p.status === 'taken') {
            statusElement.innerHTML = `🔴 На руках у: <b>${p.taken_by}</b>`;
            // Показуємо кнопку, якщо дільниця зайнята
            if (returnBtn) {
                returnBtn.style.display = 'inline-block';
                returnBtn.onclick = () => window.returnParcel(p.id, p.name);
            }
        } else {
            statusElement.innerHTML = `🟢 Вільна`;
            if (returnBtn) returnBtn.style.display = 'none';
        }

        document.getElementById('mainSaveBtn').disabled = !isAdmin;
    }

    // --- РЕШТА ВАШИХ ФУНКЦІЙ БЕЗ ЗМІН ---

    window.showManualLogModal = async () => {
        document.getElementById('manualLogModal').classList.remove('hidden');
        const select = document.getElementById('manualPublisherSelect');
        
        const { data: users } = await supabase
            .from('publishers')
            .select('name, last_name')
            .order('last_name', { ascending: true });

        if (users) {
            select.innerHTML = '<option value="">Оберіть вісника</option>';
            users.forEach(u => {
                const opt = document.createElement('option');
                const shortName = `${u.name} ${u.last_name ? u.last_name[0] + '.' : ''}`;
                opt.value = shortName;
                opt.text = `${u.last_name || ''} ${u.name}`.trim();
                select.appendChild(opt);
            });
        }
    };

    window.saveManualLog = async () => {
    const shortName = document.getElementById('manualPublisherSelect').value;
    const dIn = document.getElementById('manualDateIn').value;  // Дата взяття
    const dOut = document.getElementById('manualDateOut').value; // Дата повернення
    
    if (!shortName || !dIn || !dOut) return alert("Заповніть усі поля");
    
    // --- РОЗРАХУНОК ТРИВАЛОСТІ ---
    const start = new Date(dIn);
    const end = new Date(dOut);
    const diffTime = Math.abs(end - start);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    
    let durationText = "";
    if (diffDays >= 30) {
        const months = Math.floor(diffDays / 30);
        durationText = `${months} міс.`;
    } else {
        durationText = `${diffDays} дн.`;
    }
    // ----------------------------

    const { error } = await supabase.from('territory_logs').insert([{
        parcel_id: parcelId, 
        publisher_name: shortName, 
        taken_at: dIn, 
        returned_at: dOut,
        duration_text: durationText // Тепер ми передаємо цей текст вручну
    }]);

    if (!error) { 
        hideManualLogModal(); 
        loadHistory(); 
    } else {
        alert("Помилка збереження: " + error.message);
    }
};

    window.hideManualLogModal = () => document.getElementById('manualLogModal').classList.add('hidden');

    document.getElementById('backBtn').onclick = () => {
        const from = urlParams.get('from');
        if (from === 'map') window.location.href = 'index.html';
        else if (from === 'all') window.location.href = 'profile.html?tab=all-territories';
        else if (from === 'my') window.location.href = 'profile.html?tab=my-card';
        else window.location.href = 'profile.html';
    };

    async function loadComments() {
        const { data: comments } = await supabase.from('parcel_comments').select('*').eq('parcel_id', parcelId).order('created_at', { ascending: true });
        allComments = comments || [];
        const list = document.getElementById('commentsList');
        const { data: p } = await supabase.from('parcels').select('taken_by_id').eq('id', parcelId).single();
        const isHolder = (p && p.taken_by_id === currentUserId);

        if (allComments.length === 0) {
            list.innerHTML = '<p style="color:gray; font-style:italic; text-align:center; padding:10px;">Коментарів немає</p>';
        } else {
            list.innerHTML = allComments.map((c, i) => {
                const canManage = isAdmin || (c.user_id === currentUserId);
                const colorIdx = (i % 6) + 1;
                return `
                    <div class="comment-item color-${colorIdx}">
                        ${canManage ? `<div style="position:absolute; top:5px; right:5px;">
                            <button onclick="prepareEditComment(${i})" style="background:none; font-size:12px; opacity:0.5;">✏️</button>
                            <button onclick="deleteComment(${c.id})" style="background:none; font-size:12px; opacity:0.5;">❌</button>
                        </div>` : ''}
                        <p>${c.content.replace(/\n/g, '<br>')}</p>
                        <div class="author-line">
                            <b>${c.is_anonymous && !isAdmin ? '👤 Анонімно' : (c.is_anonymous ? '🕵️ '+c.author_name : c.author_name)}</b>
                            <span>${new Date(c.created_at).toLocaleString('uk-UA', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                    </div>`;
            }).join('');
        }
        if (isAdmin || isHolder) {
            document.getElementById('addCommentContainer').innerHTML = `<button onclick="openCommentModal()" style="background:none; border:1px dashed #28a745; color:#28a745; width:100%; padding:8px; border-radius:8px; margin-top:5px;">+ Додати коментар</button>`;
        }
    }

    window.saveComment = async () => {
        const content = document.getElementById('newCommentText').value;
        if (!content.trim()) return;
        const payload = {
            parcel_id: Number(parcelId),
            user_id: currentUserId,
            author_name: localStorage.getItem('userFullName') || 'Вісник',
            content: content,
            is_anonymous: document.getElementById('hideAuthorCheckbox').checked
        };
        const { error } = editingCommentId 
            ? await supabase.from('parcel_comments').update({content, is_anonymous: payload.is_anonymous}).eq('id', editingCommentId)
            : await supabase.from('parcel_comments').insert([payload]);
        if (!error) { closeCommentModal(); loadComments(); }
    };

   window.saveGeneralChanges = async () => {
        let dateVal = document.getElementById('lastProcessedDate').value;
        
        // --- ЛОГІКА КОРЕКЦІЇ РОКУ ---
        // Якщо користувач ввів дату вручну (не через календар), деякі браузери 
        // можуть передати її в нетиповому форматі. Додамо перевірку:
        if (dateVal) {
            let [year, month, day] = dateVal.split('-');
            
            // Якщо рік короткий (наприклад, "0025" або просто "25")
            if (year.length <= 4 && parseInt(year) < 100) {
                year = "20" + year.padStart(2, '0');
                dateVal = `${year}-${month}-${day}`;
            }
        }

        const { error } = await supabase
            .from('parcels')
            .update({ 
                last_processed: dateVal || null, 
                last_returned: dateVal || null 
            })
            .eq('id', parcelId);

        if (!error) { 
            alert("Збережено"); 
            loadParcelInfo(); 
        } else {
            alert("Помилка: " + error.message);
        }
    };

    async function loadHistory() {
        const { data: logs } = await supabase.from('territory_logs').select('*').eq('parcel_id', parcelId).order('returned_at', { ascending: false });
        const body = document.getElementById('historyBody');
        if (!logs?.length) {
            body.innerHTML = '<tr><td colspan="5" style="text-align:center; color:gray; padding:15px;">Історія порожня</td></tr>';
            return;
        }
        body.innerHTML = logs.map(log => `
            <tr>
                <td><b>${log.publisher_name}</b></td>
                <td>${new Date(log.taken_at).toLocaleDateString('uk-UA')}</td>
                <td>${new Date(log.returned_at).toLocaleDateString('uk-UA')}</td>
                <td><span class="badge">${log.duration_text || '-'}</span></td>
                <td>${isAdmin ? `<button onclick="deleteLogRecord(${log.id})" style="background:none; color:red;">🗑️</button>` : '—'}</td>
            </tr>`).join('');
    }

    window.deleteLogRecord = async (id) => {
        if (confirm("Видалити запис?")) {
            await supabase.from('territory_logs').delete().eq('id', id);
            loadHistory();
        }
    }

    window.openCommentModal = () => { editingCommentId = null; document.getElementById('newCommentText').value = ""; document.getElementById('commentModal').classList.remove('hidden'); };
    window.closeCommentModal = () => document.getElementById('commentModal').classList.add('hidden');
    
    init();
</script>
</body>
</html>
